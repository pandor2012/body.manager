<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Панель команд</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1>Панель команд</h1>
      <p class="subtitle">Нажмите кнопку для отправки действия</p>

      <section class="status" aria-live="polite">
        <span class="status-label">Текущая команда:</span>
        <strong id="current-command">Не выбрана</strong>
      </section>

      <section class="buttons" role="group" aria-label="Команды">
        <button data-command="Влево">Влево</button>
        <button data-command="Вправо">Вправо</button>
        <button data-command="Не двигаться">Не двигаться</button>
        <button data-command="Лечь на пол">Лечь на пол</button>
        <button data-command="Присесть">Присесть</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
