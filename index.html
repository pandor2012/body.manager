<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abyss Command Core</title>
    <link rel="stylesheet" href="style.css?v=20260227-abyss-1" />
  </head>
  <body>
    <main class="app">
      <header class="hud">
        <span class="mode-badge">ABYSS CORE</span>
        <h1>Командный Пульт</h1>
        <p class="subtitle">Активируйте ядро один раз, затем запускайте команды через боевой интерфейс.</p>
      </header>

      <section class="start-zone">
        <button id="start-button" class="start-button">Старт</button>
        <p class="start-note">Однократная активация. После запуска система остаётся онлайн.</p>
      </section>

      <section class="status" aria-live="polite">
        <div class="status-top">
          <span class="status-label">Последняя команда</span>
          <span class="status-chip" id="system-state" data-state="locked">Заблокировано</span>
        </div>
        <strong id="current-command">Ожидание старта</strong>
      </section>

      <section class="buttons" role="group" aria-label="Команды">
        <button class="command-button left" data-command="Влево" disabled>Влево</button>
        <button class="command-button right" data-command="Вправо" disabled>Вправо</button>
        <button class="command-button hold" data-command="Не двигаться" disabled>Не двигаться</button>
        <button class="command-button floor" data-command="Лечь на пол" disabled>Лечь на пол</button>
        <button class="command-button crouch" data-command="Присесть" disabled>Присесть</button>
      </section>
    </main>

    <script src="script.js?v=20260227-abyss-1"></script>
  </body>
</html>
